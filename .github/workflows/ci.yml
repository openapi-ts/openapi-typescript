name: ci

on:
  push:
    branches:
      - main
      - "renovate/**"
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - uses: pnpm/action-setup@v5
        with:
          run_install: true
      - run: pnpm run lint
  test-node-versions:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - uses: pnpm/action-setup@v5
        with:
          run_install: true
      - run: pnpm test
      - name: Generate coverage
        if: matrix.node-version == 24
        run: |
          pnpm --filter='openapi-fetch' --filter='openapi-react-query' --filter='openapi-typescript' run test:js -- --coverage
          mkdir -p coverage
          for pkg in openapi-fetch openapi-react-query openapi-typescript; do
            if [ -f "packages/$pkg/coverage/lcov.info" ]; then
              sed "s|SF:|SF:packages/$pkg/|g" "packages/$pkg/coverage/lcov.info" >> coverage/lcov.info
            fi
          done
      - name: Upload coverage to Qlty
        if: matrix.node-version == 24
        uses: qltysh/qlty-action/coverage@v2
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: coverage/lcov.info
  test-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - uses: pnpm/action-setup@v5
        with:
          run_install: true
      - run: pnpm exec playwright install --with-deps
      - run: pnpm run test-e2e
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - uses: pnpm/action-setup@v5
        with:
          run_install: true
      - run: pnpm test
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: latest
      - uses: pnpm/action-setup@v5
        with:
          run_install: true
      - run: pnpm test
